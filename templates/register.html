<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>
        Register
    </title>

    <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
    rel="stylesheet">

    <style>

        body{

            background-image:
            url("{{ url_for('static',
            filename='background.jpg') }}");

            background-size: cover;

            background-position: center;

            background-repeat: no-repeat;

            height: 100vh;

            display: flex;

            justify-content: center;

            align-items: center;
        }

        .register-card{

            width: 500px;

            background: rgba(
                255,
                255,
                255,
                0.95
            );

            border-radius: 15px;

            padding: 30px;

            box-shadow:
            0px 0px 20px
            rgba(0,0,0,0.3);
        }

    </style>

</head>

<body>

<div class="register-card">

    <h2 class="text-center">

        User Registration

    </h2>

    <hr>

    <form
    action="/register"
    method="POST">

        <label>

            Username

        </label>

        <input
        type="text"
        name="username"
        class="form-control"
        required>

        <br>

        <label>

            Password

        </label>

        <input
        type="password"
        name="password"
        class="form-control"
        required>

        <br>

        <button
        type="submit"
        class="btn btn-success w-100">

            Register

        </button>

    </form>

    <hr>

    <div class="text-center">

        <a href="/"
           class="btn btn-primary">

            Back To Login

        </a>

    </div>

    <br>

    <div class="text-center">

        <small>

            Customer Sales & Churn Analysis System

        </small>

    </div>

</div>

</body>

</html>
