<!DOCTYPE html>
<html>

<head>

    <title>Edit User</title>

    <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
    rel="stylesheet">

</head>

<body>

<div class="container mt-5">

    <div class="card">

        <div class="card-body">

            <h2>Edit User</h2>

            <hr>

            <form method="POST">

                <label>
                    Username
                </label>

                <input
                type="text"
                name="username"
                value="{{ user[1] }}"
                class="form-control"
                required>

                <br>

                <label>
                    Role
                </label>

                <select
                name="role"
                class="form-control">

                    <option value="user"
                    {% if user[3]=="user" %}
                    selected
                    {% endif %}>
                        User
                    </option>

                    <option value="admin"
                    {% if user[3]=="admin" %}
                    selected
                    {% endif %}>
                        Admin
                    </option>

                </select>

                <br>

                <button
                type="submit"
                class="btn btn-warning">

                    Update User

                </button>

                <a href="/admin"
                   class="btn btn-secondary">

                    Back

                </a>

            </form>

        </div>

    </div>

</div>

</body>

</html>
